  <circle cx="838" cy="208" r="10" fill="#72D1EB"/><text x="860" y="214" fill="#E4EDF6" font-family="Inter, Segoe UI, Arial" font-size="15">Keywords / operators</text>
  <circle cx="838" cy="238" r="10" fill="#BEA9F5"/><text x="860" y="244" fill="#E4EDF6" font-family="Inter, Segoe UI, Arial" font-size="15">Types / classes</text>
  <circle cx="838" cy="268" r="10" fill="#A7DA85"/><text x="860" y="274" fill="#E4EDF6" font-family="Inter, Segoe UI, Arial" font-size="15">Strings</text>

  <rect x="804" y="320" width="322" height="132" rx="16" fill="#151B22" stroke="#1F2A36"/>
  <text x="830" y="356" fill="#E4EDF6" font-family="Inter, Segoe UI, Arial" font-size="18" font-weight="700">Midnight feel</text>
  <text x="830" y="388" fill="#94A2B4" font-family="Inter, Segoe UI, Arial" font-size="15">Much darker background,</text>
  <text x="830" y="412" fill="#94A2B4" font-family="Inter, Segoe UI, Arial" font-size="15">still readable and gentle</text>
  <text x="830" y="436" fill="#94A2B4" font-family="Inter, Segoe UI, Arial" font-size="15">for night sessions.</text>

  <rect x="24" y="654" width="1152" height="42" rx="0" fill="#0D1218"/>
  <text x="46" y="680" fill="#E4EDF6" font-family="Inter, Segoe UI, Arial" font-size="14">Melayang • Midnight</text>
  <text x="1082" y="680" text-anchor="end" fill="#72D1EB" font-family="Inter, Segoe UI, Arial" font-size="14">ndhaniff</text>
</svg>
