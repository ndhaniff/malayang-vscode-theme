  <text x="285" y="93" fill="#E4EDF6" font-family="Inter, Segoe UI, Arial" font-size="13">midnight-theme.ts</text>

  <text x="52" y="112" fill="#94A2B4" font-family="Inter, Segoe UI, Arial" font-size="13" font-weight="700">EXPLORER</text>
  <rect x="42" y="128" width="184" height="28" rx="8" fill="#151B22"/>
  <text x="56" y="146" fill="#E4EDF6" font-family="Inter, Segoe UI, Arial" font-size="13">themes</text>
  <text x="68" y="178" fill="#D9E5F0" font-family="Inter, Segoe UI, Arial" font-size="13">midnight-theme.ts</text>
  <text x="68" y="206" fill="#94A2B4" font-family="Inter, Segoe UI, Arial" font-size="13">palette.ts</text>
  <text x="68" y="234" fill="#94A2B4" font-family="Inter, Segoe UI, Arial" font-size="13">README.md</text>

  <g font-family="JetBrains Mono, Fira Code, monospace" font-size="24">
    <text x="286" y="160" fill="#7A8898">// extra dark, same Melayang identity</text>

    <text x="286" y="206" fill="#72D1EB">export</text>
    <text x="370" y="206" fill="#72D1EB">function</text>
    <text x="488" y="206" fill="#F2F7FC"> makeTheme</text>
    <text x="642" y="206" fill="#90A0B4">(</text>
    <text x="656" y="206" fill="#DFC78F">mode</text>
    <text x="712" y="206" fill="#90A0B4">:</text>
    <text x="730" y="206" fill="#BEA9F5">"midnight"</text>
    <text x="850" y="206" fill="#90A0B4">) {</text>

    <text x="322" y="248" fill="#72D1EB">return</text>
    <text x="406" y="248" fill="#90A0B4">{</text>

    <text x="358" y="290" fill="#E4EDF6">background</text>
    <text x="500" y="290" fill="#90A0B4">:</text>
    <text x="518" y="290" fill="#F5AFC1">"#11161d"</text>
    <text x="658" y="290" fill="#90A0B4">,</text>

    <text x="358" y="332" fill="#E4EDF6">keyword</text>
    <text x="472" y="332" fill="#90A0B4">:</text>
    <text x="490" y="332" fill="#72D1EB">"#72d1eb"</text>
    <text x="630" y="332" fill="#90A0B4">,</text>

    <text x="358" y="374" fill="#E4EDF6">string</text>
    <text x="458" y="374" fill="#90A0B4">:</text>
    <text x="476" y="374" fill="#A7DA85">"#a7da85"</text>
    <text x="616" y="374" fill="#90A0B4">,</text>

    <text x="358" y="416" fill="#E4EDF6">constant</text>
    <text x="486" y="416" fill="#90A0B4">:</text>
    <text x="504" y="416" fill="#F5AFC1">"#f5afc1"</text>
    <text x="644" y="416" fill="#90A0B4">,</text>

    <text x="322" y="458" fill="#90A0B4">}</text>
    <text x="286" y="500" fill="#90A0B4">}</text>

    <text x="286" y="568" fill="#7A8898">// lower-light setup without harsh contrast</text>
  </g>

  <rect x="804" y="132" width="322" height="160" rx="16" fill="#151B22" stroke="#1F2A36"/>
