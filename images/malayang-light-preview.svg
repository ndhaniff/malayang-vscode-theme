    <text x="526" y="430" fill="#9A752E">props</text>
    <text x="596" y="430" fill="#243245">:</text>
    <text x="614" y="430" fill="#7A5DE0">Readonly</text>
    <text x="734" y="430" fill="#243245">) {</text>

