    <text x="518" y="392" fill="#F7B7C8">"#0d1117"</text>
    <text x="658" y="392" fill="#97A8BD">,</text>

    <text x="358" y="434" fill="#E7F0F8">keyword</text>
    <text x="472" y="434" fill="#97A8BD">:</text>
    <text x="490" y="434" fill="#7DDAF2">"#7ddaf2"</text>
    <text x="630" y="434" fill="#97A8BD">,</text>

