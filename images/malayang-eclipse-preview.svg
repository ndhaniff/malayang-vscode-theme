  <text x="68" y="234" fill="#98A8BA" font-family="Inter, Segoe UI, Arial" font-size="13">README.md</text>

  <g font-family="JetBrains Mono, Fira Code, monospace" font-size="24">
    <text x="286" y="160" fill="#8292A5">// deepest variant for ultra-dark setups</text>

