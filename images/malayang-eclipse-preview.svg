    <text x="354" y="206" fill="#E7F0F8"> glow </text>
    <text x="440" y="206" fill="#7DDAF2">=</text>
    <text x="466" y="206" fill="#0D1117"> </text>
    <text x="480" y="206" fill="#AFDF8F">"eclipse"</text>

    <text x="286" y="252" fill="#7DDAF2">type</text>
    <text x="354" y="252" fill="#E7F0F8"> Mode </text>
    <text x="430" y="252" fill="#7DDAF2">=</text>
    <text x="456" y="252" fill="#C6B3F8">"eclipse"</text>
    <text x="590" y="252" fill="#7DDAF2"> | </text>
    <text x="630" y="252" fill="#C6B3F8">"midnight"</text>

    <text x="286" y="308" fill="#7DDAF2">function</text>
    <text x="404" y="308" fill="#F5F9FD"> makePalette</text>
    <text x="570" y="308" fill="#97A8BD">(</text>
